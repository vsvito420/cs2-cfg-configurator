name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'   # Trigger nur bei Tags wie v0.1.0, v1.2.3

permissions:
  contents: write  # Nötig für Release erstellen

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: cs2-cfg-configurator
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build .exe with PyInstaller (via .spec)
        working-directory: cs2-cfg-configurator
        run: |
          python -m PyInstaller CS2-CFG-Configurator.spec

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2-CFG-Configurator-windows
          path: cs2-cfg-configurator/dist/CS2-CFG-Configurator.exe

  release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: CS2-CFG-Configurator-windows
          path: dist/

      - name: Create Release & Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          name: "CS2 CFG Configurator ${{ github.ref_name }}"
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'pre') }}
          body: |
            ## 🎮 CS2 CFG Configurator ${{ github.ref_name }}

            ### 📥 Installation
            1. `CS2-CFG-Configurator.exe` herunterladen
            2. Starten – kein Python oder pip nötig!

            ### 📝 Lizenz
            CC BY-NC 4.0 – keine kommerzielle Nutzung ohne Erlaubnis.
          files: dist/CS2-CFG-Configurator.exe
          token: ${{ secrets.GITHUB_TOKEN }}
