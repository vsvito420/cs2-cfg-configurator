name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: cs2-cfg-configurator
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build .exe with PyInstaller (via .spec)
        working-directory: cs2-cfg-configurator
        run: |
          python -m PyInstaller CS2-CFG-Configurator.spec

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2-CFG-Configurator-exe
          path: cs2-cfg-configurator/dist/CS2-CFG-Configurator.exe

  package-zip:
    name: Package Project ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create project ZIP
        run: |
          ZIP_NAME="cs2-cfg-configurator-${{ github.ref_name }}.zip"
          zip -r "$ZIP_NAME" cs2-cfg-configurator/ \
            --exclude "cs2-cfg-configurator/__pycache__/*" \
            --exclude "cs2-cfg-configurator/dist/*" \
            --exclude "cs2-cfg-configurator/build/*" \
            --exclude "cs2-cfg-configurator/*.spec"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2-CFG-Configurator-zip
          path: cs2-cfg-configurator-${{ github.ref_name }}.zip

  release:
    name: Create GitHub Release
    needs: [build-windows, package-zip]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: CS2-CFG-Configurator-exe
          path: dist/

      - name: Download ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: CS2-CFG-Configurator-zip
          path: dist/

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: "CS2 CFG Configurator ${{ github.ref_name }}"
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'pre') }}
          body: |
            ## 🎮 CS2 CFG Configurator ${{ github.ref_name }}

            ### 📥 Downloads

            | Datei | Für wen? |
            |---|---|
            | `CS2-CFG-Configurator.exe` | Normale Nutzer – einfach starten, kein Python nötig |
            | `cs2-cfg-configurator-${{ github.ref_name }}.zip` | Entwickler / Quellcode mit Abhängigkeiten |

            ### 🚀 EXE starten
            Einfach `CS2-CFG-Configurator.exe` herunterladen und ausführen.

            ### 📦 ZIP installieren
            ```bash
            pip install -r requirements.txt
            python main.py
            ```

            ### 📄 Lizenz
            CC BY-NC 4.0 – keine kommerzielle Nutzung ohne Erlaubnis.
          files: |
            dist/CS2-CFG-Configurator.exe
            dist/cs2-cfg-configurator-${{ github.ref_name }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}
